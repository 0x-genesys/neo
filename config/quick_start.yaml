# Quick Start Configuration - Very small model for fast testing
model:
  vocab_size: 50257
  d_model: 128        # Very small
  num_heads: 4
  num_layers: 2       # Only 2 layers
  context_length: 128 # Short context
  dropout: 0.1
  use_gradient_checkpointing: false  # Not needed for small model

training:
  batch_size: 8
  gradient_accumulation_steps: 2
  max_epochs: 2       # Just 2 epochs
  max_steps: 500      # Stop after 500 steps
  learning_rate: 5.0e-4
  weight_decay: 0.01
  warmup_steps: 50
  max_grad_norm: 1.0
  eval_interval: 100
  save_interval: 250
  log_interval: 10

data:
  dataset_name: "wikitext"
  dataset_config: "wikitext-2-raw-v1"
  train_split: "train"
  val_split: "validation"
  test_split: "test"
  max_length: 128
  num_workers: 0  # Set to 0 for Mac compatibility (multiprocessing issues)

tokenizer:
  type: "gpt2"
  vocab_size: 50257

optimizer:
  type: "adamw"
  betas: [0.9, 0.95]
  eps: 1.0e-8

scheduler:
  type: "cosine"
  min_lr: 5.0e-5

system:
  device: "auto"
  mixed_precision: false  # Disabled for compatibility
  compile_model: false
  seed: 42

checkpoint:
  save_dir: "checkpoints/quick_start"
  resume_from: null

logging:
  use_wandb: false
  log_dir: "logs/quick_start"

generation:
  max_new_tokens: 50
  temperature: 0.8
  top_k: 50
  top_p: 0.95
  num_samples: 2
