# GPU Training Configuration - 6.7B Parameter Model (GPT-3 Medium)
# GPT-3 Medium scale for commercial foundation models
# Requires multi-GPU setup (8-16x A100 80GB)

model:
  vocab_size: 100277  # GPT-4 tokenizer
  d_model: 4096        # GPT-3 Medium standard
  num_heads: 32        # head_dim = 4096/32 = 128
  num_layers: 32
  context_length: 2048
  dropout: 0.1
  use_gradient_checkpointing: true  # Required

# Training Configuration
training:
  batch_size: 1        # Per GPU
  gradient_accumulation_steps: 256  # Effective batch = 256 (single GPU) or 2048 (8 GPUs)
  max_epochs: 1
  max_steps: 1500000   # 1.5M steps
  learning_rate: 8.0e-5
  weight_decay: 0.1
  warmup_steps: 20000  # ~1.3% of total steps
  max_grad_norm: 1.0
  eval_interval: 10000
  save_interval: 25000
  log_interval: 10

# Data Configuration
data:
  dataset_name: "togethercomputer/RedPajama-Data-1T"  # 1T tokens
  dataset_config: "default"
  train_split: "train"
  val_split: "train"  # RedPajama doesn't have val split
  test_split: "train"
  max_length: 2048
  num_workers: 8
  pin_memory: true

# Tokenizer Configuration
tokenizer:
  type: "Xenova/gpt-4"  # GPT-4 tokenizer (100k vocab)
  vocab_size: 100277

# Optimization
optimizer:
  type: "adamw"
  betas: [0.9, 0.95]
  eps: 1.0e-8

scheduler:
  type: "cosine_with_warmup"
  min_lr: 8.0e-6

# System Configuration
system:
  device: "cuda"
  mixed_precision: true  # Essential
  compile_model: true
  seed: 42

# Checkpointing
checkpoint:
  save_dir: "checkpoints/gpu_training_6.7b"
  resume_from: null
  save_best_only: false

# Logging
logging:
  use_wandb: true  # Highly recommended
  wandb_project: "transformer-6.7b"
  wandb_entity: null
  log_dir: "logs/gpu_training_6.7b"

# Generation
generation:
  max_new_tokens: 200
  temperature: 0.8
  top_k: 50
  top_p: 0.95
  num_samples: 3

# ============================================================================
# MODEL SPECIFICATIONS
# ============================================================================
# Parameters: ~6.7B
# Architecture: GPT-3 Medium
# Memory (FP16): ~200GB (model + optimizer + activations)
# GPU Required: 8-16x A100 80GB
# Training Time: 2-3 months on 16x A100
# Dataset: RedPajama (1T tokens) or custom high-quality data
# Chinchilla Optimal: 6.7B × 20 = 134B tokens
# Actual Training: 1.5M steps × 1 × 2048 × 256 = 786B tokens (5.9× optimal)
# Expected Loss: ~0.4-0.6
# Quality: High-quality, versatile
# Cost: ~$50,000-100,000 on cloud GPU
#
# CRITICAL REQUIREMENTS:
# 1. Distributed training with FSDP or DeepSpeed ZeRO Stage 3
# 2. CPU offloading for optimizer states
# 3. Pipeline parallelism recommended
# 4. High-bandwidth interconnect (NVLink, InfiniBand)
#
# Launch command:
# torchrun --nproc_per_node=16 --nnodes=1 train.py --config config/gpu_training_6.7b.yaml
#
# For multi-node (e.g., 2 nodes with 8 GPUs each):
# torchrun --nproc_per_node=8 --nnodes=2 --node_rank=<0 or 1> \
#   --master_addr=<master_ip> --master_port=29500 \
#   train.py --config config/gpu_training_6.7b.yaml
# ============================================================================
