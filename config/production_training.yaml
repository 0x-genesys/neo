# Production Training Configuration
# Balanced for CPU training - larger than quick_start, realistic training time
# Expected time: 6-12 hours on CPU for good results

model:
  vocab_size: 50257  # Will be set by tokenizer
  d_model: 256       # Larger than quick_start (128)
  num_heads: 8       # More heads than quick_start (4)
  num_layers: 4      # More layers than quick_start (2)
  context_length: 256  # Longer context than quick_start (128)
  dropout: 0.1
  use_flash_attention: false
  use_gradient_checkpointing: false  # Not needed for 16M model on CPU

# Training Configuration
training:
  batch_size: 8      # Same as quick_start (CPU friendly)
  gradient_accumulation_steps: 4  # Effective batch size = 32
  max_epochs: 10     # Will train for multiple epochs
  max_steps: 10000    # 10x more than quick_start (500)
  learning_rate: 3.0e-4
  weight_decay: 0.01
  warmup_steps: 200
  max_grad_norm: 1.0
  eval_interval: 250  # Validate every 250 steps
  save_interval: 500  # Save checkpoint every 500 steps
  log_interval: 10

# Data Configuration
data:
  dataset_name: "wikitext"
  dataset_config: "wikitext-2-raw-v1"  # Same as quick_start
  train_split: "train" 
  val_split: "validation"
  test_split: "test"
  max_length: 256
  num_workers: 0  # 0 for Mac compatibility (multiprocessing issues)
  pin_memory: false  # False for Mac
  
# Tokenizer Configuration
tokenizer:
  type: "gpt2"
  vocab_size: 50257
  
# Optimization
optimizer:
  type: "adamw"
  betas: [0.9, 0.95]
  eps: 1.0e-8

scheduler:
  type: "cosine"
  min_lr: 3.0e-5

# System Configuration
system:
  device: "auto"
  mixed_precision: false  # Disabled for CPU
  compile_model: false
  seed: 42
  
# Checkpointing
checkpoint:
  save_dir: "checkpoints/production"
  resume_from: null
  save_best_only: false
  
# Logging
logging:
  use_wandb: false
  wandb_project: "transformer-production"
  wandb_entity: null
  log_dir: "logs/production"
  
# Generation (for validation)
generation:
  max_new_tokens: 100
  temperature: 0.8
  top_k: 50
  top_p: 0.95
  num_samples: 3
