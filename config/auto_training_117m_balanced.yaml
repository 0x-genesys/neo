# ============================================================================
# Auto-Adaptive Training Configuration - 117M Model with Balanced Dataset
# ============================================================================
#
# This configuration automatically adapts to available hardware:
#   - TPU: Large batch sizes (128), bfloat16, XLA optimization
#   - CUDA: Medium batch sizes (16), FP16, cuDNN optimization
#   - MPS: Small batch sizes (8), no mixed precision
#   - CPU: Minimal batch sizes (4), no mixed precision
#
# SEAMLESS CHECKPOINT RESUMPTION:
#   - Resume training on different hardware without issues
#   - Batch size changes don't affect model weights
#   - Optimizer state adapts automatically
#   - Same effective batch size maintained via gradient accumulation
#
# USAGE:
#   # Start on GPU
#   python train.py --config config/auto_training_117m_balanced.yaml
#
#   # Resume on TPU (from step 7500)
#   python train.py --config config/auto_training_117m_balanced.yaml \
#       --resume checkpoints/auto_training_117m_balanced/checkpoint_step_7500.pt \
#       --tpu
#
#   # Resume on different GPU
#   python train.py --config config/auto_training_117m_balanced.yaml \
#       --resume checkpoints/auto_training_117m_balanced/checkpoint_step_7500.pt \
#       --multi-gpu
#
# ============================================================================

model:
  vocab_size: 100277  # tiktoken cl100k_base (GPT-4)
  d_model: 768        # Standard GPT-2 Small size
  num_heads: 12       # Maintains head_dim = 768/12 = 64 (optimal)
  num_layers: 12      # Good depth for reasoning
  context_length: 512 # Standard context length
  dropout: 0.12       # Moderate regularization
  use_flash_attention: false
  use_gradient_checkpointing: false  # Will be auto-enabled if needed

# Training Configuration - Hardware Adaptive
# The system will automatically adjust these based on detected hardware
training:
  # Effective batch size target: 512 tokens
  # This is maintained across all hardware via gradient accumulation
  
  # Base settings (will be overridden by hardware detection)
  batch_size: 16      # Per-device batch size (auto-adjusted)
  gradient_accumulation_steps: 8  # Auto-adjusted to maintain effective batch
  
  # Hardware-specific overrides (applied automatically):
  # TPU:  batch_size=128, grad_accum=4  → effective=512
  # CUDA: batch_size=16,  grad_accum=8  → effective=128 (or 512 with accum)
  # MPS:  batch_size=8,   grad_accum=16 → effective=128
  # CPU:  batch_size=4,   grad_accum=32 → effective=128
  
  max_epochs: 8        # 8 epochs with curriculum learning
  max_steps: 36621     # Total tokens (2.4B) / tokens-per-step (65,536)
  
  # Learning rate (auto-scaled with batch size)
  learning_rate: 2.0e-4  # Base LR for batch_size=16
  # TPU (batch=128): LR scaled to ~4.0e-4
  # CUDA (batch=16): LR = 2.0e-4
  # MPS (batch=8):   LR = 1.4e-4
  # CPU (batch=4):   LR = 1.0e-4
  
  weight_decay: 0.15
  warmup_steps: 1500
  max_grad_norm: 1.0
  dropout: 0.12
  skip_validation: true
  eval_interval: 999999
  save_interval: 1 
  log_interval: 20
  
  # Curriculum Learning - Same across all hardware
  curriculum_learning:
    enabled: true
    epoch_distributions:
      1:  [28, 13, 59]  # Current: Pattern Discovery
      2:  [70, 20, 10]  # Foundation: Knowledge/Logic Hardening
      3:  [70, 20, 10]  # Foundation: Knowledge/Logic Hardening
      4:  [50, 25, 25]  # Bridge A: Balanced Contextualization
      5:  [35, 25, 40]  # Bridge B: Priority Shift
      6:  [20, 20, 60]  # Bridge C: Instruction Emergence
      7:  [10, 10, 80]  # Refinement: Behavior & Formatting
      8:  [10, 10, 80]  # Refinement: Behavior & Formatting
    
    sources:
      - "wikitext"
      - "stack"
      - "ultrachat"

# Data Configuration - Same across all hardware
data:
  dataset_type: "binary"
  train_file: "data/balanced_300m_curriculum/train.bin"
  val_file: "data/balanced_300m_curriculum/val.bin"
  max_length: 512
  num_workers: 4       # Auto-adjusted per device
  pin_memory: true     # Auto-disabled for TPU/CPU
  
  huggingface_dataset:
    repo_id: "0x-genesys/mix_wiki_code_chat_data_300M_tokens_curriculum"
    dataset_name: "balanced_300m_curriculum"
    auto_download: true

# Tokenizer Configuration
tokenizer:
  type: "tiktoken"
  vocab_size: 100277

# Optimization
optimizer:
  type: "adamw"
  betas: [0.9, 0.95]
  eps: 1.0e-8

scheduler:
  type: "cosine"
  min_lr: 2.0e-5

# System Configuration - AUTO DETECTION
system:
  device: "auto"       # Auto-detect: TPU → CUDA → MPS → CPU
  mixed_precision: true  # Auto-adjusted (bfloat16 for TPU, FP16 for CUDA, disabled for MPS/CPU)
  compile_model: false
  seed: 42

# Checkpointing - Hardware agnostic
checkpoint:
  save_dir: "checkpoints/auto_training_117m_balanced"
  resume_from: null
  save_best_only: false
  

# Logging
logging:
  use_wandb: false
  wandb_project: "transformer-117m-auto"
  wandb_entity: null
  log_dir: "logs/auto_training_117m_balanced"

# HuggingFace Hub Integration
huggingface_hub:
  enabled: true
  repo_id: "0x-genesys/neo_weights_checkpoints"
  upload_best_only: false

# Generation
generation:
  max_new_tokens: 100
  temperature: 0.8
  top_k: 50
  top_p: 0.95
  num_samples: 3

# ============================================================================
# HARDWARE ADAPTATION RULES
# ============================================================================
#
# The system automatically applies these adjustments:
#
# TPU (Google Cloud):
#   - batch_size: 128 (large for efficiency)
#   - gradient_accumulation_steps: 4
#   - learning_rate: 4.0e-4 (scaled with sqrt(batch_ratio))
#   - mixed_precision: bfloat16
#   - num_workers: 4
#   - pin_memory: false
#   - gradient_checkpointing: false (TPU has large memory)
#
# CUDA (NVIDIA GPU):
#   - batch_size: 16 (moderate)
#   - gradient_accumulation_steps: 8
#   - learning_rate: 2.0e-4 (base)
#   - mixed_precision: FP16
#   - num_workers: 8
#   - pin_memory: true
#   - gradient_checkpointing: auto (based on memory)
#
# MPS (Apple Silicon):
#   - batch_size: 8 (conservative)
#   - gradient_accumulation_steps: 16
#   - learning_rate: 1.4e-4 (scaled down)
#   - mixed_precision: false (stability)
#   - num_workers: 4
#   - pin_memory: false
#   - gradient_checkpointing: false
#
# CPU:
#   - batch_size: 4 (minimal)
#   - gradient_accumulation_steps: 32
#   - learning_rate: 1.0e-4 (scaled down)
#   - mixed_precision: false
#   - num_workers: 4
#   - pin_memory: false
#   - gradient_checkpointing: false
#
# ============================================================================
# CHECKPOINT COMPATIBILITY
# ============================================================================
#
# Checkpoints are FULLY COMPATIBLE across hardware:
#
# 1. Model Weights: Device-independent (same across all hardware)
# 2. Optimizer State: Adapts automatically to new batch size
# 3. Training Progress: Step count and epoch preserved
# 4. Learning Rate: Scheduler state preserved
#
# Example: Resume GPU checkpoint on TPU
#   # Trained on GPU T4 to step 7500
#   python train.py --config config/auto_training_117m_balanced.yaml
#
#   # Resume on TPU from step 7500
#   python train.py --config config/auto_training_117m_balanced.yaml \
#       --resume checkpoints/auto_training_117m_balanced/checkpoint_step_7500.pt \
#       --tpu
#
#   # The system will:
#   # - Load model weights (unchanged)
#   # - Load optimizer state (adapts to new batch size)
#   # - Continue from step 7500
#   # - Use TPU-optimized settings (batch=128, bfloat16)
#
# ============================================================================
# EFFECTIVE BATCH SIZE
# ============================================================================
#
# All hardware maintains similar effective batch size via gradient accumulation:
#
# TPU:  128 × 4  = 512 tokens per update
# CUDA: 16  × 8  = 128 tokens per update (or 16 × 32 = 512)
# MPS:  8   × 16 = 128 tokens per update
# CPU:  4   × 32 = 128 tokens per update
#
# This ensures:
# - Consistent training dynamics
# - Similar convergence behavior
# - Seamless hardware transitions
#
# ============================================================================
# USAGE EXAMPLES
# ============================================================================
#
# Start training (auto-detect hardware):
#   python train.py --config config/auto_training_117m_balanced.yaml
#
# Resume on same hardware:
#   python train.py --config config/auto_training_117m_balanced.yaml \
#       --resume checkpoints/auto_training_117m_balanced/checkpoint_step_7500.pt
#
# Resume on TPU (from GPU checkpoint):
#   python train.py --config config/auto_training_117m_balanced.yaml \
#       --resume checkpoints/auto_training_117m_balanced/checkpoint_step_7500.pt \
#       --tpu
#
# Resume on multi-GPU (from single GPU checkpoint):
#   python train.py --config config/auto_training_117m_balanced.yaml \
#       --resume checkpoints/auto_training_117m_balanced/checkpoint_step_7500.pt \
#       --multi-gpu
#
# Resume from HuggingFace Hub on TPU:
#   python train.py --config config/auto_training_117m_balanced.yaml \
#       --resume-remote checkpoint_step_7500.pt \
#       --tpu
#
# ============================================================================
# MONITORING
# ============================================================================
#
# TensorBoard (works across all hardware):
#   tensorboard --logdir logs/auto_training_117m_balanced
#
# The logs show:
#   - Actual batch size used
#   - Effective batch size (batch × grad_accum)
#   - Hardware type (TPU/CUDA/MPS/CPU)
#   - Mixed precision mode
#
# ============================================================================
